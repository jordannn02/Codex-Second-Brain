<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Redacted demo vault example</title>
  <desc id="desc">A mock Obsidian vault showing sanitized system files, demo knowledge notes, logs, and a sample task flow.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7f2; }
      .panel { fill: #ffffff; stroke: #24332d; stroke-width: 2; rx: 14; }
      .soft { fill: #edf4ee; stroke: #24332d; stroke-width: 2; rx: 12; }
      .note { fill: #fbefd0; stroke: #24332d; stroke-width: 2; rx: 12; }
      .ink { fill: #18201d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #53635d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 34px; font-weight: 760; letter-spacing: 0; }
      .h2 { font-size: 22px; font-weight: 740; letter-spacing: 0; }
      .text { font-size: 16px; font-weight: 520; letter-spacing: 0; }
      .mono { font-size: 15px; font-weight: 600; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .line { stroke: #24332d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#24332d" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="680" />
  <text class="ink title" x="60" y="70">Redacted Demo Vault</text>
  <text class="muted text" x="60" y="104">Synthetic notes that show the workflow without exposing real people, companies,</text>
  <text class="muted text" x="60" y="128">ERP data, finances, screenshots, or transcripts.</text>

  <rect class="panel" x="60" y="160" width="380" height="430" />
  <text class="ink h2" x="88" y="200">demo-vault/</text>
  <text class="ink mono" x="88" y="240">_CLAUDE.md</text>
  <text class="muted text" x="286" y="240">agent rules</text>
  <text class="ink mono" x="88" y="277">index.md</text>
  <text class="muted text" x="286" y="277">navigation map</text>
  <text class="ink mono" x="88" y="314">Home.md</text>
  <text class="muted text" x="286" y="314">dashboard</text>
  <text class="ink mono" x="88" y="351">CRITICAL_FACTS.md</text>
  <text class="muted text" x="286" y="351">tiny context</text>
  <text class="ink mono" x="88" y="388">Knowledge/</text>
  <text class="muted text" x="286" y="388">evidence note</text>
  <text class="ink mono" x="88" y="425">Dev Logs/</text>
  <text class="muted text" x="286" y="425">work result</text>
  <text class="ink mono" x="88" y="462">Logs/</text>
  <text class="muted text" x="286" y="462">operation trail</text>
  <rect x="88" y="509" width="245" height="42" rx="10" fill="#24332d" />
  <text x="111" y="536" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Public-safe fake data only</text>

  <rect class="soft" x="500" y="160" width="280" height="138" />
  <text class="ink h2" x="529" y="199">User task</text>
  <text class="muted text" x="529" y="234">"Convert this screenshot</text>
  <text class="muted text" x="529" y="259">into a Markdown table."</text>

  <rect class="note" x="500" y="345" width="280" height="154" />
  <text class="ink h2" x="529" y="384">Delivered artifact</text>
  <text class="muted text" x="529" y="419">Markdown table, source path,</text>
  <text class="muted text" x="529" y="444">OCR boundary, verification.</text>
  <text class="ink mono" x="529" y="477">outputs/example.md</text>

  <rect class="panel" x="835" y="160" width="305" height="339" />
  <text class="ink h2" x="865" y="199">Captured signal</text>
  <text class="muted text" x="865" y="234">Only save reusable evidence:</text>
  <text class="ink mono" x="865" y="273">task: image-to-md</text>
  <text class="ink mono" x="865" y="307">tool: OCR fallback</text>
  <text class="ink mono" x="865" y="341">result: verified table</text>
  <text class="ink mono" x="865" y="375">boundary: no private data</text>
  <text class="ink mono" x="865" y="409">next: reuse pattern</text>
  <rect x="865" y="439" width="213" height="34" rx="9" fill="#d9efe1" stroke="#24332d" stroke-width="1.5" />
  <text class="ink text" x="884" y="462">Ready for similar tasks</text>

  <path class="line" d="M780 229 H829" />
  <path class="line" d="M640 299 V339" />
  <path class="line" d="M780 422 H829" />
  <path class="line" d="M440 380 H493" />

  <rect class="panel" x="60" y="612" width="1080" height="42" />
  <text class="ink text" x="88" y="639">The demo explains behavior. The real vault stays private and is never copied into public examples.</text>
</svg>
