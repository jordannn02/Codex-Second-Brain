<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Demo vault route memory</title>
  <desc id="desc">A stable GitHub README diagram showing the public demo vault as a route-memory operating layer.</desc>
  <defs>
    <style>
      .bg { fill: #f8f2e8; }
      .panel { fill: #ffffff; stroke: #18221f; stroke-width: 4; rx: 20; }
      .chipA { fill: #dff3e8; stroke: #18221f; stroke-width: 4; rx: 20; }
      .chipB { fill: #fff0bd; stroke: #18221f; stroke-width: 4; rx: 20; }
      .chipC { fill: #dcecff; stroke: #18221f; stroke-width: 4; rx: 20; }
      .chipD { fill: #ffd7df; stroke: #18221f; stroke-width: 4; rx: 20; }
      .ink { fill: #11191d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .muted { fill: #51605b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .title { font-size: 48px; font-weight: 840; }
      .subtitle { font-size: 22px; font-weight: 560; }
      .label { font-size: 27px; font-weight: 830; }
      .small { font-size: 18px; font-weight: 620; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 18px; font-weight: 760; }
      .line { stroke: #18221f; stroke-width: 5; fill: none; stroke-linecap: round; marker-end: url(#arrow); }
      .dash { stroke: #ef476f; stroke-width: 5; fill: none; stroke-linecap: round; stroke-dasharray: 13 12; marker-end: url(#arrowRed); }
      .softLine { stroke: #7a8a84; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#18221f" />
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ef476f" />
    </marker>
  </defs>

  <rect class="bg" width="1400" height="820" />
  <text class="ink title" x="70" y="84">Demo Vault: Route Memory</text>
  <text class="muted subtitle" x="70" y="122">Synthetic examples show how repeated work becomes safer future routing.</text>

  <rect class="panel" x="70" y="174" width="300" height="148" />
  <text class="ink label" x="104" y="216">Startup Files</text>
  <text class="ink mono" x="104" y="252">_CLAUDE.md</text>
  <text class="ink mono" x="104" y="282">index.md</text>
  <text class="ink mono" x="104" y="312">CRITICAL_FACTS.md</text>

  <rect class="panel" x="70" y="380" width="300" height="148" />
  <text class="ink label" x="104" y="422">Capture Events</text>
  <text class="muted small" x="104" y="458">what changed, why it matters</text>
  <text class="muted small" x="104" y="488">evidence stays attached</text>

  <rect class="chipA" x="450" y="174" width="270" height="122" />
  <text class="ink label" x="484" y="216">Auto-Router</text>
  <text class="muted small" x="484" y="252">choose the right capability</text>

  <rect class="chipB" x="790" y="174" width="270" height="122" />
  <text class="ink label" x="824" y="216">Route Memory</text>
  <text class="muted small" x="824" y="252">reuse proven paths</text>

  <rect class="chipC" x="450" y="380" width="270" height="122" />
  <text class="ink label" x="484" y="422">Deliver</text>
  <text class="muted small" x="484" y="458">visible result first</text>

  <rect class="chipD" x="790" y="380" width="270" height="122" />
  <text class="ink label" x="824" y="422">Suppress Noise</text>
  <text class="muted small" x="824" y="458">failed routes decay</text>

  <rect class="panel" x="1110" y="252" width="220" height="172" />
  <text class="ink label" x="1142" y="294">Demo Only</text>
  <text class="muted small" x="1142" y="330">no private vault</text>
  <text class="muted small" x="1142" y="360">no credentials</text>
  <text class="muted small" x="1142" y="390">safe to inspect</text>

  <path class="line" d="M370 246 H450" />
  <path class="line" d="M720 235 H790" />
  <path class="line" d="M1060 235 C1110 245 1120 260 1110 300" />
  <path class="line" d="M370 454 H450" />
  <path class="dash" d="M720 442 H790" />
  <path class="softLine" d="M925 502 C925 580 760 616 584 502" />
  <path class="softLine" d="M584 296 C584 340 584 354 584 380" />

  <rect class="panel" x="260" y="606" width="880" height="102" />
  <text class="ink label" x="294" y="648">Weekly Consolidation</text>
  <text class="muted small" x="294" y="684">turn repeated signals into route memory, but report before writing or deleting.</text>

  <rect class="panel" x="70" y="742" width="1260" height="52" />
  <text class="ink small" x="104" y="775">Public demo vault: synthetic memory anatomy. Real private memory stays outside the public repository.</text>
</svg>
