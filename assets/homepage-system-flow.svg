<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Codex Second Brain workflow</title>
  <desc id="desc">A workflow diagram showing startup context, capability routing, delivery first, capture routing, memory graph, and weekly consolidation.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ef; }
      .ink { fill: #18201d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #52615b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { fill: #ffffff; stroke: #20332b; stroke-width: 2; rx: 14; }
      .box-green { fill: #d9efe1; stroke: #20332b; stroke-width: 2; rx: 14; }
      .box-gold { fill: #f3dfaa; stroke: #20332b; stroke-width: 2; rx: 14; }
      .box-blue { fill: #dce8f7; stroke: #20332b; stroke-width: 2; rx: 14; }
      .line { stroke: #20332b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7b6750; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow-muted); }
      .title { font-size: 34px; font-weight: 760; letter-spacing: 0; }
      .subtitle { font-size: 18px; font-weight: 520; letter-spacing: 0; }
      .label { font-size: 21px; font-weight: 720; letter-spacing: 0; }
      .small { font-size: 15px; font-weight: 520; letter-spacing: 0; }
      .tiny { font-size: 13px; font-weight: 520; letter-spacing: 0; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#20332b" />
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7b6750" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="650" />
  <text class="ink title" x="60" y="70">Codex Second Brain OS</text>
  <text class="muted subtitle" x="60" y="105">Delivery-first operating loop for AI agents.</text>
  <text class="muted subtitle" x="60" y="132">Markdown memory, evidence boundaries, capability routing, and safe capture.</text>

  <rect class="box-green" x="50" y="170" width="245" height="116" />
  <text class="ink label" x="76" y="208">1. Startup context</text>
  <text class="muted small" x="76" y="240">Read _CLAUDE, index,</text>
  <text class="muted small" x="76" y="264">Home, CRITICAL_FACTS.</text>

  <rect class="box-blue" x="335" y="170" width="245" height="116" />
  <text class="ink label" x="361" y="208">2. Route capability</text>
  <text class="muted small" x="361" y="240">Pick tools by task type,</text>
  <text class="muted small" x="361" y="264">not by habit.</text>

  <rect class="box-gold" x="620" y="170" width="245" height="116" />
  <text class="ink label" x="646" y="208">3. Deliver first</text>
  <text class="muted small" x="646" y="240">Return the answer, file,</text>
  <text class="muted small" x="646" y="264">query, or artifact.</text>

  <rect class="box" x="905" y="170" width="245" height="116" />
  <text class="ink label" x="931" y="208">4. Verify boundary</text>
  <text class="muted small" x="931" y="240">Separate memory, docs,</text>
  <text class="muted small" x="931" y="264">source, SQL, runtime.</text>

  <path class="line" d="M295 228 H330" />
  <path class="line" d="M580 228 H615" />
  <path class="line" d="M865 228 H900" />

  <rect class="box" x="105" y="385" width="285" height="130" />
  <text class="ink label" x="132" y="425">5. Capture routing</text>
  <text class="muted small" x="132" y="457">Save durable signals:</text>
  <text class="muted small" x="132" y="481">decisions, paths, guards,</text>
  <text class="muted small" x="132" y="505">results, lessons.</text>

  <rect class="box-green" x="457" y="385" width="285" height="130" />
  <text class="ink label" x="484" y="425">6. Memory graph</text>
  <text class="muted small" x="484" y="457">Strengthen good routes,</text>
  <text class="muted small" x="484" y="481">suppress repeated failures,</text>
  <text class="muted small" x="484" y="505">keep evidence links.</text>

  <rect class="box-blue" x="809" y="385" width="285" height="130" />
  <text class="ink label" x="836" y="425">7. Consolidation</text>
  <text class="muted small" x="836" y="457">Refresh indexes, surface</text>
  <text class="muted small" x="836" y="481">stale rules, preserve</text>
  <text class="muted small" x="836" y="505">source evidence.</text>

  <path class="dash" d="M1028 290 C1028 335 951 340 951 380" />
  <path class="line" d="M390 450 H452" />
  <path class="line" d="M742 450 H804" />
  <path class="dash" d="M600 380 C600 335 457 335 457 290" />

  <rect x="60" y="590" width="1085" height="66" rx="12" fill="#20332b" />
  <text x="88" y="617" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="650" letter-spacing="0">Design principle: public method, private memory.</text>
  <text x="88" y="642" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="650" letter-spacing="0">Ship the answer first; save only what makes the next task faster and more reliable.</text>
</svg>
