<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Adaptive route memory for agents</title>
  <desc id="desc">A clean GitHub README diagram showing startup context, route memory, evidence checks, delivery, and feedback learning without overlapping labels.</desc>
  <defs>
    <style>
      .bg { fill: #0e1418; }
      .lane { fill: #152126; stroke: #33463f; stroke-width: 3; rx: 20; }
      .card { fill: #f7efe3; stroke: #17231f; stroke-width: 3; rx: 16; }
      .ink { fill: #f8faf7; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .muted { fill: #aab9b3; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .dark { fill: #111b1f; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .soft { fill: #41534d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .title { font-size: 46px; font-weight: 820; }
      .subtitle { font-size: 22px; font-weight: 560; }
      .label { font-size: 25px; font-weight: 780; }
      .small { font-size: 17px; font-weight: 610; }
      .caption { font-size: 19px; font-weight: 720; }
      .line { stroke: #7f948c; stroke-width: 4; fill: none; stroke-linecap: round; }
      .learn { stroke: #ffd166; stroke-width: 6; fill: none; stroke-linecap: round; stroke-dasharray: 3 16; }
      .dotA { fill: #2ec4a6; }
      .dotB { fill: #ffd166; }
      .dotC { fill: #8ecae6; }
      .dotD { fill: #ef476f; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="760" />
  <text class="ink title" x="70" y="78">Adaptive Route Memory for Agents</text>
  <text class="muted subtitle" x="70" y="116">The agent retrieves a proven path, verifies evidence, delivers first, then learns from the outcome.</text>

  <rect class="lane" x="70" y="158" width="1260" height="388" />

  <rect class="card" x="104" y="218" width="260" height="118" />
  <text class="dark label" x="128" y="256">Startup Context</text>
  <text class="soft small" x="128" y="288">small index</text>
  <text class="soft small" x="128" y="314">task scope</text>

  <rect class="card" x="404" y="218" width="260" height="118" />
  <text class="dark label" x="428" y="256">Route Memory</text>
  <text class="soft small" x="428" y="288">proven paths</text>
  <text class="soft small" x="428" y="314">avoid repeats</text>

  <rect class="card" x="704" y="218" width="260" height="118" />
  <text class="dark label" x="728" y="256">Evidence Check</text>
  <text class="soft small" x="728" y="288">sources + data</text>
  <text class="soft small" x="728" y="314">runtime proof</text>

  <rect class="card" x="1004" y="218" width="260" height="118" />
  <text class="dark label" x="1028" y="256">Deliver First</text>
  <text class="soft small" x="1028" y="288">answer first</text>
  <text class="soft small" x="1028" y="314">then capture</text>

  <path class="line" d="M364 277 H404" />
  <path class="line" d="M664 277 H704" />
  <path class="line" d="M964 277 H1004" />
  <circle class="dotA" cx="384" cy="277" r="8" />
  <circle class="dotB" cx="684" cy="277" r="8" />
  <circle class="dotC" cx="984" cy="277" r="8" />

  <rect class="card" x="172" y="404" width="304" height="102" />
  <text class="dark label" x="198" y="442">Reinforce</text>
  <text class="soft small" x="198" y="474">successful routes get stronger</text>

  <rect class="card" x="548" y="404" width="304" height="102" />
  <text class="dark label" x="574" y="442">Weaken</text>
  <text class="soft small" x="574" y="474">failed routes lose weight</text>

  <rect class="card" x="924" y="404" width="304" height="102" />
  <text class="dark label" x="950" y="442">Consolidate</text>
  <text class="soft small" x="950" y="474">maintenance reports changes</text>

  <path class="learn" d="M324 520 C474 572 920 572 1076 520" />
  <circle class="dotA" cx="324" cy="520" r="12" />
  <circle class="dotD" cx="700" cy="548" r="12" />
  <circle class="dotC" cx="1076" cy="520" r="12" />

  <rect class="lane" x="70" y="600" width="1260" height="92" />
  <text class="ink caption" x="104" y="636">Human-memory loop: retrieve, verify, deliver, capture, reinforce, inhibit, consolidate.</text>
  <text class="muted small" x="104" y="666">Memory suggests the route; evidence still comes from files, commands, data, and user-visible results.</text>
</svg>
