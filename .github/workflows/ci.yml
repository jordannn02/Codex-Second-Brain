name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Validate demo vault
        run: second-brain validate demo-vault

      - name: Dry-run consolidation
        run: second-brain consolidate demo-vault --dry-run

      - name: Route suggestion smoke test
        run: second-brain route-suggest demo-vault "debugging noisy search source trace"

      - name: Run tests
        run: python -m unittest discover -s tests
