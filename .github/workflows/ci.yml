name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Validate demo vault
        run: second-brain validate demo-vault

      - name: Dry-run consolidation
        run: second-brain consolidate demo-vault --dry-run

      - name: Route suggestion smoke test
        run: second-brain route-suggest demo-vault "debugging noisy search source trace"

      - name: Operational hardening smoke tests
        run: |
          second-brain health demo-vault --today 2026-07-11
          second-brain capture-gate demo-vault --mode AUTO_CAPTURE --target "Knowledge/Synthetic capture.md" --delivery-complete
          second-brain retrieval-benchmark demo-vault --cases demo-vault/fixtures/retrieval-cases.json
          second-brain index-check demo-vault
          second-brain privacy-scan codex_second_brain demo-vault

      - name: Content-aware status smoke test
        run: |
          second-brain status-build demo-vault --cases demo-vault/fixtures/retrieval-cases.json --now 2026-07-11T00:00:00+00:00 --valid-hours 24 --output /tmp/second-brain-status.json --write
          second-brain status-watch /tmp/second-brain-status.json demo-vault --cases demo-vault/fixtures/retrieval-cases.json --now 2026-07-11T01:00:00+00:00

      - name: Run tests
        run: python -m unittest discover -s tests
